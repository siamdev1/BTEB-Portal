<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BTEB Portal | Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/custom.css">
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
</head>

<body class="bg-hero min-h-screen flex flex-col items-center justify-center px-6 py-12 relative">
    <!-- Back to Home -->
    <a href="index.html"
        class="absolute top-8 left-8 flex items-center space-x-2 text-indigo-400 hover:text-indigo-300 transition-colors group">
        <span class="material-symbols-outlined group-hover:-translate-x-1 transition-transform">arrow_back</span>
        <span class="font-bold font-outfit">Back to Home Page</span>
    </a>

    <!-- Global Loading Overlay -->
    <div id="loader" class="loading-overlay">
        <div class="spinner"></div>
        <div class="loading-text">BTEB Portal...</div>
    </div>

    <div class="glass-card w-full max-w-lg p-8 md:p-12 rounded-3xl animate-fade-in">
        <div class="text-center mb-10">
            <div
                class="w-16 h-16 bg-gradient-to-br from-indigo-500 to-purple-600 rounded-2xl flex items-center justify-center mx-auto mb-6 shadow-xl shadow-indigo-500/20">
                <span class="material-symbols-outlined text-white text-3xl">lock_open</span>
            </div>
            <h1 class="text-3xl font-bold font-outfit text-gradient mb-2">Welcome Back</h1>
            <p class="text-slate-400">Sign in to your BTEB Student Portal</p>
        </div>

        <form id="loginForm" class="space-y-6">
            <!-- Identifier -->
            <div class="space-y-2">
                <label class="label-premium">Email, Roll or Reg No.</label>
                <div class="relative">
                    <span
                        class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-500">alternate_email</span>
                    <input type="text" id="identifier" required placeholder="Enter your credentials"
                        class="w-full bg-white/5 border border-white/10 rounded-xl py-4 pl-12 pr-4 focus:ring-2 focus:ring-indigo-500/50 focus:border-indigo-500/50 transition-all outline-none">
                </div>
            </div>

            <!-- Password -->
            <div class="space-y-2">
                <div class="flex justify-between items-center px-1">
                    <label class="label-premium !mb-0">Password</label>
                    <a href="#" class="text-xs text-indigo-400 hover:underline">Forgot?</a>
                </div>
                <div class="relative">
                    <span
                        class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-500">key</span>
                    <input type="password" id="password" required placeholder="••••••••"
                        class="w-full bg-white/5 border border-white/10 rounded-xl py-4 pl-12 pr-4 focus:ring-2 focus:ring-indigo-500/50 focus:border-indigo-500/50 transition-all outline-none">
                </div>
            </div>

            <div class="flex items-center space-x-2 px-1">
                <input type="checkbox" id="remember"
                    class="w-4 h-4 rounded border-white/10 bg-white/5 text-indigo-600 focus:ring-indigo-500/50">
                <label for="remember" class="text-sm text-slate-400">Remember me</label>
            </div>

            <button type="submit"
                class="btn-premium w-full py-4 rounded-xl font-bold text-lg shadow-lg shadow-indigo-500/30 flex items-center justify-center space-x-2">
                <span>Sign In</span>
                <span class="material-symbols-outlined">login</span>
            </button>
        </form>

        <p class="mt-8 text-center text-slate-400">
            Don't have an account?
            <a href="register.html" class="text-indigo-400 font-bold hover:underline">Register Now</a>
        </p>
    </div>

    <!-- Background Decoration -->
    <div class="fixed top-0 left-0 w-full h-full -z-10 pointer-events-none opacity-50">
        <div
            class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[800px] h-[800px] bg-indigo-500/5 blur-[150px] rounded-full">
        </div>
    </div>

    <script type="module" src="js/auth.js"></script>
</body>

</html>
